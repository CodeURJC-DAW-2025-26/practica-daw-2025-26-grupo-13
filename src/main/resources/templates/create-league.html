{{>header}}

<section class="py-5 bg-under-header flex-1">
    <div class="container px-4 px-lg-5 mt-5">
        <div class="card mb-4 rounded-3 shadow-sm border-primary">
            <div class="card-header py-3 text-bg-primary border-primary">
                <h4 class="my-0 fw-normal text-center">Crear nueva liga</h4>
            </div>
            <form method="POST" action="/create-league">
                <div class="card-body">
                    <input type="hidden" name="_csrf" value="{{token}}" />

                    <div class="mb-3 text-start">
                        <label for="league-name" class="form-label fw-bold">Nombre de liga</label>
                        <input type="text" name="name" class="form-control" id="name" required>
                    </div>


                    <div class="d-flex justify-content-between mt-4">
                        <button type="button" class="btn btn-secondary" onclick="history.back()">Atrás</button>
                        <button type="submit" class="btn btn-success">Aceptar</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</section>

{{>footer}}
