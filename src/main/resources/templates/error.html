<!DOCTYPE html>
<html lang="es">

<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Panel de Administración - Marble Rush Arena" />
    <title>Marble Rush Arena</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="css/custom.css" rel="stylesheet" />
</head>

<body display="flex" class="bg-under-header d-flex flex-column min-vh-100">



    <header class="bg-dark py-3">
        <div class="container px-4 px-lg-5 my-3 d-flex justify-content-center">
            <div class="text-center text-white d-flex align-items-center justify-content-center">
                <div class="d-flex align-items-center justify-content-center">
                    <img src="/assets/images/marble-game.png" alt="Logo app" class="me-3 rounded" style="height:80px;">
                    <h1 class="display-6 fw-bolder">MARBLE RUSH ARENA</h1>
                </div>
            </div>
        </div>
    </header>

<div class="container d-flex flex-column justify-content-center align-items-center text-center my-5 py-5">
    <div class="error-card p-5 rounded shadow-lg" style="background: linear-gradient(to bottom, #0d2f66, #214ca8); color: white; max-width: 600px; border: 2px solid #214ca8;">
        <i class="bi bi-exclamation-triangle-fill" style="font-size: 4rem; margin-bottom: 20px; color: #ffb300;"></i>
        <h1 class="display-5 fw-bold mb-3">Error {{status}}: {{error}}</h1>
        <p class="lead mb-4">{{message}}</p>
        <div class="mt-4">
            <a href="/" class="btn btn-warning btn-lg fw-bold px-5">Volver a inicio</a>
        </div>
    </div>
</div>

{{>footer}}
