

{{>header}}

    <div class="container py-5">
            <canvas id="myChart"></canvas>
    </div>
    

    <script>
  const ctx = document.getElementById('myChart');

  new Chart(ctx, {
    type: 'pie',
    data: {
  labels:[
    'Derrotas {{user.loseCounter}}',
    'Victorias {{user.winCounter}}',
  ],
  datasets: [{
    label: 'My First Dataset',
    data: [{{user.loseCounter}}, {{user.winCounter}}], 
    backgroundColor: [
      'rgb(255, 99, 132)',
      'rgb(54, 162, 235)',
    ],
    hoverOffset: 4
  }]
}
  });
</script>

    {{>footer}}
