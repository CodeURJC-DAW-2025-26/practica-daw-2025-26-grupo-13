{{>header}}

<div class="container px-4 px-lg-5 my-5">
    <h1 class="fw-bolder text-center">Editar Liga</h1>

    <form action="/edit-league/{{leagueId}}" method="post">
        <input type="hidden" name="_csrf" value="{{token}}" />

        {{#league}}
        <div class="mb-3 text-start">
            <label for="league-name" class="form-label fw-bold">Nombre de liga</label>
            <input type="text" name="name" class="form-control" id="league-name" value="{{name}}" required>
        </div>

        <div class="mb-3 form-check text-start">
            <input type="checkbox" name="status" class="form-check-input" id="league-status" {{#status}}checked{{/status}}>
            <label class="form-check-label" for="league-status">Abierta</label>
        </div>

        <div class="d-flex justify-content-between mt-4">
            <button type="button" class="btn btn-secondary" onclick="history.back()">Atrás</button>
            <button type="submit" class="btn btn-success">Guardar</button>
        </div>
        {{/league}}
    </form>

    <hr class="my-5" />

    <h2 class="fw-bolder mb-4">Carreras</h2>

    {{#races}}
    <div class="card mb-3">
        <div class="card-body">
            <div class="d-flex flex-column flex-lg-row gap-3 align-items-lg-end justify-content-between">

                <div class="flex-grow-1">
                    <label class="form-label fw-bold">Nombre de carrera</label>
                    <form action="/edit-league/{{leagueId}}/race/{{id}}/rename" method="post" class="d-flex gap-2">
                        <input type="hidden" name="_csrf" value="{{token}}" />
                        <input type="text" name="name" class="form-control" value="{{name}}" required>
                        <button type="submit" class="btn btn-success">Guardar nombre</button>
                    </form>
                    <div class="mt-2 text-muted">
                        <small>Ganador: {{winnerName}}</small>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    {{^finished}}
                    <form action="/edit-league/{{leagueId}}/race/{{id}}/start" method="post">
                        <input type="hidden" name="_csrf" value="{{token}}" />
                        <button type="submit" class="btn btn-primary">Empezar</button>
                    </form>
                    {{/finished}}

                    <form action="/edit-league/{{leagueId}}/race/{{id}}/delete" method="post" onsubmit="return confirm('¿Borrar esta carrera?')">
                        <input type="hidden" name="_csrf" value="{{token}}" />
                        <button type="submit" class="btn btn-danger">Borrar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    {{/races}}

    {{^races}}
    <p class="text-muted">Esta liga no tiene carreras.</p>
    {{/races}}
</div>

{{>footer}}
