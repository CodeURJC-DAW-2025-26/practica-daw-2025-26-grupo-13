{{>header}}

<section class="py-5 bg-under-header flex-1">
    <div class="container px-4 px-lg-5">
        <div class="row justify-content-center">
            <div class="col-lg-7 col-md-9">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-5">
                        <h1 class="fw-bolder text-center mb-4">Mi perfil</h1>

                        {{#user}}
                        <div class="text-center mb-4">
                            {{#image}}
                            <img src="/images/{{id}}" class="rounded-circle mb-2" style="width:110px;height:110px;object-fit:cover;" alt="Foto de perfil">
                            {{/image}}
                            {{^image}}
                            <img src="/assets/images/no_image.png" class="rounded-circle mb-2" style="width:110px;height:110px;object-fit:cover;" alt="Foto de perfil">
                            {{/image}}
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre de usuario</label>
                            <input type="text" class="form-control" value="{{name}}" disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="text" class="form-control" value="{{email}}" disabled>
                        </div>

                        <div class="row g-3">
                            <div class="col-sm-6">
                                <label class="form-label fw-bold">Victorias</label>
                                <input type="text" class="form-control" value="{{winCounter}}" disabled>
                            </div>
                            <div class="col-sm-6">
                                <label class="form-label fw-bold">Derrotas</label>
                                <input type="text" class="form-control" value="{{loseCounter}}" disabled>
                            </div>
                        </div>
                        {{/user}}

                        <hr class="my-4">

                        <div class="d-flex justify-content-center">
                            <a href="/view-user/marbles" class="btn btn-primary">Ver mis canicas</a>
                        </div>
                    </div>
                </div>

                <div class="d-flex align-items-center justify-content-between w-100 mt-4">
                    <a href="/" class="btn btn-secondary">Volver a la pagina principal</a>
                </div>
            </div>
        </div>
    </div>
</section>

{{>footer}}
