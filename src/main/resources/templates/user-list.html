{{>header}}

    <div class="container px-4 px-lg-5 my-3 text-center">

                <h1 class="fw-bolder">Usuarios: </h1>
                
    </div>


    <!-- Section-->
    <section class="py-5 bg-bajo-header flex-1">
        <div class="container px-4 px-lg-5 ">
            <div class="row gx-4 gx-lg-5 row-cols-2 row-cols-md-3 row-cols-xl-4 justify-content-center">
                {{#users}}
                <div class="col mb-5">
                    <div class="card h-100">
                        <!-- Product image-->
                        <!-- Product details-->
                        <div class="card-body p-4">
                            <div class="text-center">
                                <!-- Product name-->
                                <h5 class="fw-bolder">{{name}}</h5>
                            </div>
                        </div>
                        <!-- Product actions-->
                        <div class="card-body d-flex flex-column align-items-center gap-3">
                            <button type="button" class="w-40 btn btn-lg btn-secondary" onclick="location.href='/edit-user/{{id}}'"> Editar</button>
                            <button type="button" class="w-40 btn btn-lg btn-danger" onclick="location.href='/remove-user/{{id}}'"> Eliminar</button>
                        </div>
                    </div>
                </div>
                {{/users}}

            </div>

            <div class="d-flex align-items-center justify-content-between w-100">
                <!-- Botón izquierdo -->
                <button type="button" class="btn btn-danger" onclick="location.href='/'">Atrás</button>
                
            </div>

        </div>
    </section>
    {{>footer}}
