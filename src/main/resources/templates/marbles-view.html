{{>header}}

    <section>
        <div class="container mt-5 mb-5 padding-20" id="container">

            <div class="row row-cols-1 row-cols-md-3 g-4">
                {{#marbles}}
                <div class="col">
                    <div class="card h-100 text-center shadow-sm league-card">
                        <div class="card-body">
                            {{#image}}
                            <img src="/images/{{image.id}}" alt="{{name}}" class="canica-image img-fluid mb-3" style="max-height: 200px; object-fit: cover; border-radius: 50%;">
                            {{/image}}
                            {{^image}}
                            <img src="/assets/images/Canica_base.jpg" alt="Sin imagen" class="canica-image img-fluid mb-3" style="max-height: 200px; object-fit: cover; border-radius: 50%;">
                            {{/image}}
                            
                            <h5 class="card-title fw-bold mb-3">{{name}}</h5>
                            
                            <div class="d-flex justify-content-center gap-2">
                                <a href="/chooseMarble/{{id}}" class="btn btn-success">Elegir</a>
                                <a href="/editMarble/{{id}}" class="btn btn-warning">Editar</a>
                                <form action="/removeMarble/{{id}}" method="post" class="m-0">
                                    <input type="hidden" name="_csrf" value="{{token}}"/>
                                    <button type="submit" class="btn btn-danger">Eliminar</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
                {{/marbles}}

                {{#emptySlots}}
                <div class="col">
                    <div class="card h-100 text-center shadow-sm league-card">
                        <div class="card-body d-flex flex-column justify-content-center align-items-center">
                            <h5 class="card-title fw-bold mb-3 text-muted">Aún no hay canica</h5>
                            <a href="/newMarble" class="btn btn-outline-success btn-lg mt-3">Crear Canica</a>
                        </div>
                    </div>
                </div>
                {{/emptySlots}}
            </div>

            <div class="d-flex align-items-center justify-content-between w-100 mt-5">
                <button type="button" class="btn btn-danger" onclick="window.location.href='/'">Atrás</button>                
            </div>
        </div>
    </section>

{{>footer}}
