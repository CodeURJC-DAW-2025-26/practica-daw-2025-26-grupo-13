<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Panel de Administración - Marble Rush Arena" />
    <title>Marble Rush Arena</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="css/custom.css" rel="stylesheet" />
</head>

<body display="flex" class="bg-under-header d-flex flex-column min-vh-100">



    <header class="bg-dark py-3">
        <div class="container px-4 px-lg-5 my-3">
            <div class="text-center text-white">
                <div class="d-flex align-items-center justify-content-center justify-content-xl-start">
                    <img src="/assets/images/marble-game.png" alt="Logo app" class="me-3 rounded" style="height:80px;">
                    <h1 class="display-6 fw-bolder">MARBLE RUSH ARENA</h1>
                </div>
            </div>
        </div>
    
        
        <div class="container">
            <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">
                <a href="/" class="d-flex align-items-center my-2 my-lg-0 text-white text-decoration-none">
                    <svg class="bi me-2" width="20" height="12" role="img" aria-label="Bootstrap">
                        <use xlink:href="#bootstrap"></use>
                    </svg>
                </a>

                <div class="d-flex justify-content-between my-3 mx-4">
                    <div class="d-flex gap-3">
                        {{#logged}}
                            {{#admin}}
                            <span class="badge bg-danger d-flex align-items-center px-3">MODO ADMINISTRADOR</span>
                            <a href="/user-ranking" class="btn btn-primary">Ver ranking</a>
                            <a href="/" class="btn btn-primary">Página principal</a>
                            <form action="/logout" method="post" class="d-inline">
                                <button class="btn btn-primary btn-nowrap" type="submit">Cerrar Sesión</button>
                                <input type="hidden" name="_csrf" value="{{token}}" />
                            </form>
                            {{/admin}}
                            <!--botones registrado-->
                            {{^admin}}
                            <a href="/statistics/{{userid}}" class="btn btn-primary">Ver estadísticas</a>
                            <a href="/user-ranking" class="btn btn-primary">Ver ranking</a>
                            <a href="/" class="btn btn-primary">Página principal</a>
                            <a href="/edit-user/{{userid}}" class="btn btn-primary">Editar perfil</a>
                            <form action="/logout" method="post" class="d-inline">
                                <button class="btn btn-primary btn-nowrap" type="submit">Cerrar Sesión</button>
                                <input type="hidden" name="_csrf" value="{{token}}" />
                            </form>

                            {{/admin}}
                        {{/logged}}
                        <!--botones anonimo-->
                        {{^logged}}
                            <a href="/user-ranking" class="btn btn-primary">Ver ranking</a>
                            <a href="/" class="btn btn-primary">Página principal</a>
                            <a href="/login-form" class="btn btn-primary">Iniciar sesión</a>
                            <a href="/register" class="btn btn-primary">Registrarse</a>
                        {{/logged}}

                        
                        

                    </div>
                </div>
            </div>
        </div>

        
        
         
    
    </header>
