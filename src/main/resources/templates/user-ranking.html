{{>header}}    

    <section class="py-5 bg-under-header flex-1">
        <div class="container px-4 px-lg-5 mt-5">

            <div class="card mb-4 rounded-3 shadow-sm border-primary">
                <div class="card-header py-3 text-bg-primary border-primary">
                    <h4 class="my-0 fw-normal text-center"> Ranking de liga - Top 10</h4>
                </div>

                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th scope="col" class="text-center w-10p">#</th>
                                    <th scope="col" class="w-60p">Jugador y Canica</th>
                                    <th scope="col" class="text-end pe-4 w-30p">Victorias</th>
                                </tr>
                            </thead>
                            <tbody>
                                
                                {{#users}}
                                <tr>
                                    <td class="text-center rank-1">{{-index}}</td>
                                    <td>
                                        <span class="marble-entity m-gold"></span>
                                        <strong>{{name}}</strong>  
                                    </td>
                                    <td class="text-end pe-4 fw-bold">{{winCounter}}</td>
                                </tr>
                                {{/users}}
                                
                                
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="d-flex align-items-center justify-content-center w-100 mt-4">
                <button type="button" class="btn btn-danger px-4" onclick="history.back()">
                    <i class="bi bi-arrow-left me-2"></i>Volver
                </button>
            </div>

        </div>
    </section>
    
{{>footer}}
