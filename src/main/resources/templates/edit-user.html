{{>header}}
<form action="/edit-user" method="post" enctype="multipart/form-data">
    <input type="hidden" name="_csrf" value="{{token}}" />
    <input type="hidden" name="id" value="{{user.id}}" />

    <div class="container px-4 px-lg-5 my-3 text-center">
        <h1 class="fw-bolder">Editar Perfil</h1>     
    </div>

    
    <section class="py-5 bg-bajo-header flex-1">
        <div class="container px-4 px-lg-5">
            
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8">
                    <div class="card shadow-sm border-0">
                        <div class="card-body p-5">
                            {{#user}}
                            <div class="text-center mb-4">
                                {{#image}}
                                <img src="/images/{{id}}" class="rounded-circle mb-2" style="width:100px;height:100px;object-fit:cover;" alt="Foto de perfil">
                                {{/image}}
                                {{^image}}
                                <img src="/assets/images/no_image.png" class="rounded-circle mb-2" style="width:100px;height:100px;object-fit:cover;" alt="Foto de perfil">
                                {{/image}}
                            </div>
                                <div class="mb-3">
                                    <label for="username" class="form-label fw-bold">Nombre de usuario</label>
                                    <div class="input-group">
                                        <input type="text" name="name" class="form-control" id="name" value="{{name}}">
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label for="password" class="form-label fw-bold">Contraseña</label>
                                    <div class="input-group">
                                        <input type="password" name="password" class="form-control" id="password" placeholder="Nueva contraseña (dejar vacío para no cambiar)">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="email" class="form-label fw-bold">Email</label>
                                    <div class="input-group">
                                        <input type="email" name="email" class="form-control" id="email" value="{{email}}" required>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Foto de perfil</label>
                                    <input type="file" name="imageField" accept="image/*" class="form-control" id="imageField" onchange="previewImage(event)">
                                    <div class="text-center mt-3" id="previewContainer" style="display:none;">
                                        <img id="imagePreview" class="rounded-circle" style="width:100px;height:100px;object-fit:cover;" alt="Vista previa">
                                    </div>
                                </div>

                                <hr class="my-4">

                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-primary btn-lg">
                                        <i class="bi bi-pencil"></i> Editar Cuenta
                                    </button>
                                    {{#admin}}
                                    <button type="button" class="btn btn-danger btn-lg" onclick="if (confirm('Are you sure?')) location.href='/remove-user-admin/{{id}}'">
                                        <i class="bi bi-trash"></i> Eliminar Cuenta
                                    </button>
                                    {{/admin}}
                                    {{^admin}}
                                    <button type="button" class="btn btn-danger btn-lg" onclick="if (confirm('Are you sure?')) location.href='/remove-user'">
                                        <i class="bi bi-trash"></i> Eliminar Cuenta
                                    </button>
                                    {{/admin}}
                                </div>

                            </form>
                            {{/user}}
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex align-items-center justify-content-between w-100 mt-4">
                <button type="button" class="btn btn-secondary" onclick="history.back()">Volver</button>
            </div>

        </div>
    </section>
</form>

<script>
function previewImage(event) {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('imagePreview').src = e.target.result;
            document.getElementById('previewContainer').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
}
</script>

{{>footer}}
