{{>header}}
<form action="/edit-user" method="post" enctype="multipart/form-data">
    <input type="hidden" name="_csrf" value="{{token}}" />
    <input type="hidden" name="id" value="{{User.id}}" />

    <div class="container px-4 px-lg-5 my-3 text-center">
        <h1 class="fw-bolder">Editar Perfil</h1>     
    </div>

    
    <section class="py-5 bg-bajo-header flex-1">
        <div class="container px-4 px-lg-5">
            
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8">
                    <div class="card shadow-sm border-0">
                        <div class="card-body p-5">
                            {{#user}}
                            <div class="text-center mb-4">
                                {{#User}}
                                    {{#Image}}
                                        <img src="/images/{{id}}" alt="Imagen de perfil" class="img-fluid rounded-circle mb-3" style="width: 150px; height: 150px; object-fit: cover;">
                                        <div class="form-check">
                                        <input type="checkbox" name="removeImage" class="form-check-input" id="removeImage">
                                        <label class="form-check-label" for="removeImage">Remove Image</label>
                                        </div>
                                        <div class="mb-3">
                                            <label for="updateImage" class="form-label">Update Image</label>
                                        </div>
                                    {{/Image}}
                                    {{^Image}}
                                    <img src="/assets/images/no_image.png"  class="img-fluid rounded-circle mb-3" style="width: 150px; height: 150px; object-fit: cover;">
                                        <div class="mb-3">
                                                <label for="updateImage" class="form-label">Upload Image</label>
                                        </div>
                                    {{/Image}}

                                    <input type="file" name="imageField" accept=".jpg, .jpeg" class="form-control mb-3" />
                                {{/User}}

                            </div>
                                <div class="mb-3">
                                    <label for="username" class="form-label fw-bold">Nombre de usuario</label>
                                    <div class="input-group">
                                        <input type="text" name="name" class="form-control" id="name" value="{{User.name}}">
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label for="password" class="form-label fw-bold">Contraseña</label>
                                    <div class="input-group">
                                        <input type="text" name="password" class="form-control" id="password">
                                        
                                    </div>
                                </div>

                                <hr class="my-4">

                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-primary btn-lg">
                                        <i class="bi bi-pencil"></i> Editar Cuenta
                                    </button>
                                    <button type="button" class="btn btn-danger btn-lg" onclick="DeleteUser()">
                                        <i class="bi bi-trash"></i> Eliminar Cuenta
                                    </button>
                                </div>

                            </form>
                            {{/user}}
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex align-items-center justify-content-between w-100 mt-4">
                <button type="button" class="btn btn-secondary" onclick="history.back()">Volver</button>
            </div>

        </div>
    </section>
</form>

    {{>footer}}
