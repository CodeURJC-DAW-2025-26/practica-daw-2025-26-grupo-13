{{>header}}

<section class="py-5 bg-under-header flex-1">
    <div class="container px-4 px-lg-5">
        <div class="text-center mb-4">
            <h1 class="fw-bolder">Mis canicas</h1>
        </div>

        <div class="row row-cols-1 row-cols-md-3 g-4">
            {{#marbles}}
            <div class="col">
                <div class="card h-100 text-center shadow-sm league-card">
                    <div class="card-body">
                        {{#image}}
                        <img src="/images/{{image.id}}" alt="{{name}}" class="canica-image img-fluid mb-3" style="max-height: 200px; object-fit: cover; border-radius: 50%;">
                        {{/image}}
                        {{^image}}
                        <img src="/assets/images/Canica_base.jpg" alt="Sin imagen" class="canica-image img-fluid mb-3" style="max-height: 200px; object-fit: cover; border-radius: 50%;">
                        {{/image}}

                        <h5 class="card-title fw-bold mb-3">{{name}}</h5>
                    </div>
                </div>
            </div>
            {{/marbles}}
        </div>

        {{^marbles}}
        <div class="alert alert-info text-center" role="alert">
            Aun no tienes canicas registradas.
        </div>
        {{/marbles}}

        <div class="d-flex align-items-center justify-content-between w-100 mt-4">
            <a href="/view-user" class="btn btn-secondary">Atras</a>
            <a href="/" class="btn btn-secondary">Pagina principal</a>
        </div>
    </div>
</section>

{{>footer}}
