{{>header}}

<form action="/edit-comment" method="post">
    <input type="hidden" name="_csrf" value="{{token}}" />

    {{#comment}}
    <input type="hidden" name="id" value="{{id}}" />

    <div class="container px-4 px-lg-5 my-5 text-center">
        <h1 class="fw-bolder mb-4">Editar comentario</h1>

        <div class="mb-3 text-start">
            <label for="comment-text" class="form-label fw-bold">Texto</label>
            <textarea name="text" id="comment-text" class="form-control" required>{{text}}</textarea>
        </div>

        <div class="mb-3 text-start">
            <label for="comment-rating" class="form-label fw-bold">Valoración</label>
            <input type="number" name="rating" id="comment-rating" class="form-control" min="0" max="10" value="{{rating}}" required>
        </div>

        <div class="mb-3 text-start">
            <label class="form-label fw-bold">Liga</label>
            <input type="text" class="form-control" value="{{league.name}}" disabled>
            <input type="hidden" name="leagueId" value="{{league.id}}" />
        </div>

        <div class="d-flex justify-content-between mt-4">
            <button type="button" class="btn btn-secondary" onclick="history.back()">Atrás</button>
            <button type="submit" class="btn btn-success">Guardar</button>
        </div>
    </div>
    {{/comment}}
</form>

{{>footer}}
